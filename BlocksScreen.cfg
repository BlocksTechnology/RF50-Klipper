[server]
host: localhost
port: 7125

[screensaver]
timeout: 5000

[usb_manager]
gcodes_dir: ~/printer_data/gcodes/

[hotspot]
ssid: PrinterHotspot
password: 123456789

[filament_presence]
object: cutter_sensor
name: extruder_cutter

[configuration_manager]
printer_model: RF50
config_repo: ~/RF50-Klipper/
config_dir: ~/printer_data/config/
backup_dir: ~/RF50-Klipper-Backup/
variant: 0
copy_files: printer.cfg, variables.cfg, BlocksScreen.cfg
