[gcode_macro SET_GCODE_OFFSET]
rename_existing: SET_GCODE_OFFSET_ORIG
variable_restored: False
variable_runtime_offset: 0 
gcode: 
    SET_GCODE_OFFSET_ORIG { rawparams }


[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
gcode: 
    _BED_MESH_CALIBRATE METHOD=rapid_scan ADAPTIVE=1 ADAPTIVE_MARGIN=2


[gcode_macro COLLECT_BED_MESH_POINTS]
gcode:
    _BED_MESH_CALIBRATE METHOD=scan ADAPTIVE=1 ADAPTIVE_MARGIN=1

[gcode_macro LDC_CALIBRATE_DRIVE_CURRENT]
rename_existing: LDC_CALIBRATE_DRIVE_CURRENT_BASE
description: Home, move to bed center, calibrate drive current and save configuration
gcode:
    {% set chip = params.CHIP %}
    {% set cx = printer.toolhead.axis_maximum.x / 2 %}
    {% set cy = printer.toolhead.axis_maximum.y / 2 %}
    HOME_IF_NEEDED
    G90
    G1 Z20 F{60 * 100}
    G1 X{cx} Y{cy} F{60 * 100}
    LDC_CALIBRATE_DRIVE_CURRENT_BASE CHIP={chip}
    M400
    SAVE_CONFIG

[gcode_macro PROBE_EDDY_CURRENT_CALIBRATE]
rename_existing: PROBE_EDDY_CURRENT_CALIBRATE_BASE
description: Clear bed mesh, move to bed center and start eddy calibration
gcode:
    {% set chip = params.CHIP %}
    {% set cx = printer.toolhead.axis_maximum.x / 2 %}
    {% set cy = printer.toolhead.axis_maximum.y / 2 %}
    BED_MESH_CLEAR
    HOME_IF_NEEDED
    {% if printer.toolhead.position.z < 20 %}
        G1 Z20 F{60 * 100}
    {% endif %}
    G90
    G1 X{cx} Y{cy} F{60 * 100}
    PROBE_EDDY_CURRENT_CALIBRATE_BASE CHIP={chip}
