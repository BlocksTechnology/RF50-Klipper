[gcode_macro PRINT_START]
description: Machine Print start macro.
variable_btemp:0  
variable_etemp:0
gcode:
    {% set variables = printer.save_variables.variables %}
    {% set _user_variables = printer["gcode_macro _USER_VARIABLES"] %}
    {% set btemp = params.BED| default(60) |int %}
    {% set etemp = params.EXTRUDER| default(220) | int %}
    {% set filament_type = params.FILAMENT_TYPE|default("PLA") %}
    {% set nozzle_size = params.NOZZLE_SIZE | default(0.4) | float %}
    {% set model_offset = printer.configfile.settings['beacon model default'].model_offset %}
    CLEAR_PAUSE
    SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=etemp VALUE={etemp}
    SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=btemp VALUE={btemp}


    SET_GCODE_OFFSET Z={model_offset}

    MMU_START_SETUP {rawparams}  
    MMU_START_CHECK                  
    MMU_START_LOAD_INITIAL_TOOL      

    RESPOND MSG="Starting initial print calibration...."
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={btemp}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={150}

    G21          ; set to mm
    M220 S100	 ; set print speed to 100%
    M221 S100	 ; set flow rate to 100%
    M107         ; disable fans
    G90          ; absolute positioning
    G28

    {action_respond_info("Heating bed to %dºC" % (btemp))}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={btemp} MAXIMUM={btemp + 10}   ; wait for bed temp     
    DISABLE_ALL_FANS
    RESPOND MSG="Nozzle Cleaning"
    CLEAN_NOZZLE
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150

    # Tilt
    RESPOND MSG="Leveling gantry"
    Z_TILT_ADJUST
    G28 # necessary after the z tilt adjust routine 

    {action_respond_info("Heating extruder to %dºC" % (etemp))}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={etemp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={etemp} MAXIMUM={etemp|int + 10}
    BEACON_AUTO_CALIBRATE SAMPLES=3 SKIP_MODEL_CREATION=1

    RESPOND MSG="Building mesh..."
    BED_MESH_CALIBRATE METHOD=beacon PROBE_METHOD=PROXIMITY # ADAPTIVE=1 

    BEACON_AUTO_CALIBRATE SAMPLES=2 SKIP_MODEL_CREATION=1


    {action_respond_info("Heating extruder to %dºC" % (etemp))}
    G92 E0

    # Nozzle thermal expansion 
    # SET_GCODE_OFFSET Z=0.1

    RESPOND MSG="Printing"


