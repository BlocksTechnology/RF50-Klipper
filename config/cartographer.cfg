[cartographer]
mcu: cartographer
x_offset: 0 
y_offset: 19.25
verbose: yes

[cartographer scan]
probe_speed: 5
mesh_runs: 2
mesh_height: 1
mesh_direction: 'x'
mesh_path: snake


[cartographer touch]
samples: 5
max_samples: 20
max_noisy_samples: 2
UNSAFE_max_touch_temperature: 150
EXPERIMENTAL_home_random_radius: 2.0
retract_distance: 1.5
sample_range: 0.015