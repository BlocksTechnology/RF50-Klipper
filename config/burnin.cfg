[gcode_macro BURN_IN]
description: Burn-in 100% customizável (Área, Velocidade, Aceleração e Tempo)
# --- Variáveis Internas ---
variable_start_time: 0
variable_duration: 86400
variable_min_x: 5
variable_max_x: 495
variable_min_y: 5
variable_max_y: 495
variable_feedrate: 6000
gcode:
    # --- Definição de Parâmetros com Valores Padrão (Defaults) ---
    {% set MIN_X = params.MIN_X|default(5)|int %}
    {% set MAX_X = params.MAX_X|default(495)|int %}
    {% set MIN_Y = params.MIN_Y|default(5)|int %}
    {% set MAX_Y = params.MAX_Y|default(495)|int %}
    {% set SPEED = params.SPEED|default(100)|int %}        # Em mm/s (Ex: 100 mm/s = F6000)
    {% set ACCEL = params.ACCEL|default(2000)|int %}       # Em mm/s²
    {% set TIME_HOURS = params.TIME_HOURS|default(24)|int %} # Tempo do teste em horas
    
    # Conversão de velocidade de mm/s para mm/min (Formato F do G-code)
    {% set FEEDRATE = SPEED * 60 %}
    # Conversão de horas para segundos
    {% set DURATION_SEC = TIME_HOURS * 3600 %}

    # Grava os parâmetros nas variáveis para o delayed_gcode usar
    SET_GCODE_VARIABLE MACRO=BURN_IN VARIABLE=min_x VALUE={MIN_X}
    SET_GCODE_VARIABLE MACRO=BURN_IN VARIABLE=max_x VALUE={MAX_X}
    SET_GCODE_VARIABLE MACRO=BURN_IN VARIABLE=min_y VALUE={MIN_Y}
    SET_GCODE_VARIABLE MACRO=BURN_IN VARIABLE=max_y VALUE={MAX_Y}
    SET_GCODE_VARIABLE MACRO=BURN_IN VARIABLE=feedrate VALUE={FEEDRATE}
    SET_GCODE_VARIABLE MACRO=BURN_IN VARIABLE=duration VALUE={DURATION_SEC}

    M117 Burn-in a iniciar...
    G90
    M83
    G28
    
    # Define a aceleração customizada para o teste
    SET_VELOCITY_LIMIT ACCELERATION={ACCEL} MINIMUM_CRUISE_RATIO=0.0
    
    G1 Z5 F600
    G1 X{MIN_X} Y{MIN_Y} F{FEEDRATE}
    M117 Burn-in a decorrer...
    
    # Inicializa o temporizador
    SET_GCODE_VARIABLE MACRO=BURN_IN VARIABLE=start_time VALUE={printer.toolhead.estimated_print_time}
    UPDATE_DELAYED_GCODE ID=_BURN_IN_TICK DURATION=1

[delayed_gcode _BURN_IN_TICK]
gcode:
    # Recupera os tempos e limites
    {% set start    = printer["gcode_macro BURN_IN"].start_time %}
    {% set duration = printer["gcode_macro BURN_IN"].duration %}
    {% set elapsed  = printer.toolhead.estimated_print_time - start %}
    
    {% set min_x    = printer["gcode_macro BURN_IN"].min_x %}
    {% set max_x    = printer["gcode_macro BURN_IN"].max_x %}
    {% set min_y    = printer["gcode_macro BURN_IN"].min_y %}
    {% set max_y    = printer["gcode_macro BURN_IN"].max_y %}
    {% set feedrate = printer["gcode_macro BURN_IN"].feedrate %}

    # Verifica se o tempo decorrido é menor que o tempo total definido
    {% if elapsed < duration %}
        
        # === CICLO DE VARRIMENTO (IDA) ===
        {% for y in range(min_y, max_y + 1, 20) %}
            G1 X{min_x} Y{y} Z5 F{feedrate}
            G1 X{max_x} Y{y} Z5 F{feedrate}
            {% if y + 10 <= max_y %}
                G1 X{max_x} Y{y + 10} Z5 F{feedrate}
                G1 X{min_x} Y{y + 10} Z5 F{feedrate}
            {% endif %}
        {% endfor %}

        # === CICLO DE VARRIMENTO (VOLTA) ===
        {% for y in range(max_y, min_y - 1, -20) %}
            G1 X{min_x} Y{y} Z5 F{feedrate}
            G1 X{max_x} Y{y} Z5 F{feedrate}
            {% if y - 10 >= min_y %}
                G1 X{max_x} Y{y - 10} Z5 F{feedrate}
                G1 X{min_x} Y{y - 10} Z5 F{feedrate}
            {% endif %}
        {% endfor %}

        # Mostra o progresso atualizado (Horas passadas / Horas totais definidas)
        M117 Burn-in: { "%.2f" % (elapsed / 3600) }h / { "%.1f" % (duration / 3600) }h

        # Reagenda o próximo ciclo
        UPDATE_DELAYED_GCODE ID=_BURN_IN_TICK DURATION=1

    {% else %}
        # Fim do teste
        M117 Burn-in concluido!
        G1 Z25 F600
        {% set centro_x = min_x + ((max_x - min_x) / 2) %}
        {% set centro_y = min_y + ((max_y - min_y) / 2) %}
        G1 X{centro_x} Y{centro_y} F{feedrate}
        
        # Restaura a aceleração original da impressora (lê o config padrão)
        SET_VELOCITY_LIMIT ACCELERATION={printer.configfile.settings.printer.max_velocity}
        
        M84
        M117 Concluido com sucesso!
    {% endif %}
