[z_tilt]:
z_positions: 
  250, 520 # Rear
  -20,-5   # left
  520, -5  # right
points:
  250,450
  40,10
  470,10
speed:200
horizontal_move_z: 10
retries: 6
retry_tolerance: 0.05 


[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
    BED_MESH_CLEAR
    {% if not printer.z_tilt.applied %}
      _Z_TILT_ADJUST PROBE_METHOD=PROXIMITY horizontal_move_z=10 retry_tolerance=2
    {% endif %}
    _Z_TILT_ADJUST PROBE_METHOD=CONTACT
