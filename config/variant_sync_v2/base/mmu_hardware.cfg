[mmu_machine]

# Number of selectable gate on (each) MMU. Generally this is a single number, but with multi-mmu (type-B) setups
# it can be a comma separated list of the number of gates per unit.
# E.g. 'num_gates: 4,4,2' for a 2xBox Turtle and 1xNight Owl multiplexed setup
#
num_gates: 1 # We only need one extruder for the normal operation
 
# MMU Vendor & Version is used to automatically configure some parameters and validate configuration
# If custom set to "Other" and uncomment the additional parameters below
#
# ERCF          1.1  add "s" suffix for Springy, "b" for Binky, "t" for Triple-Decky
#                    e.g. "1.1sb" for v1.1 with Springy mod and Binky encoder
# ERCF          2.0  community edition ERCFv2
# ERCF          3.0  community edition ERCFv3
# Tradrack      1.0  add "e" if encoder is fitted (assumed to be Binky)
# AngryBeaver
# BoxTurtle
# NightOwl
# 3MS
# QuattroBox    1.0
# QuattroBox    2.0  revised LEDs
# 3D Chameleon
# Pico
# MMX
# BTT ViViD
# KMS
# EMU
# Prusa         3.0  NOT YET SUPPORTED - COMING SOON
# Other              Generic setup that may require further customization of 'cad' parameters. See doc in mmu_parameters.cfg
#
mmu_vendor: Other			# MMU family
mmu_version: 1.0			# MMU hardware version number (add mod suffix documented above)

# The following attributes are set internally from vendor/version above. Only uncomment to customize the vendor
# default or for custom ("Other") designs
#
selector_type: VirtualSelector # E.g. LinearServoSelector (type-A), VirtualSelector (type-B), MacroSelector, RotarySelector, ...
variable_bowden_lengths: 0 #{variable_bowden_lengths}		# 1 = If MMU design has different bowden lengths per gate, 0 = bowden length is the same
#variable_rotation_distances: {variable_rotation_distances}		# 1 = If MMU design has dissimilar drive/BMG gears, thus rotation distance, 0 = One drive gear (e.g. Tradrack)
require_bowden_move: 0			# 1 = If MMU design has bowden move that is included in load/unload, 0 = zero length bowden (skip bowden move)
filament_always_gripped: 1 # {filament_always_gripped}		# 1 = Filament is always trapped by MMU (most type-B designs), 0 = MMU can release filament

has_bypass: 1				# 1 = Integrated bypass gate available, 0 = No integrated bypass; Bypassing only possible via PTFE

homing_extruder: 1			# CAUTION: Normally this should be 1. 0 will disable the homing extruder capability

# Uncomment to change the display name in UI's.  Defaults to the vendor name
display_name: BLOCKS_SIMPLE

# Full name of environment sensor object for MMU filament storage (displays temp and humidity in UI).
# Leave empty if sensor is not fitted. Polls for "temperature" and "humidity"
# E.g. If you have a section like this: [temperature_sensor MMU_enclosure]
#      Set: environment_sensor: temperature_sensor MMU_enclosure
# environment_sensor:

# Full name of filament heater object. Leave empty if heater is not fitted
# E.g. If you have a section like this: [heater_generic MMU_heater]
#      Set: filament_heater: heater_generic MMU_heater
# filament_heater:

# PER-GATE heaters and environment sensors. Some modular MMU designs have per-gate control (e.g. EMU). For this type of MMU, leave
# 'environment_sensor' and 'filament_heater' empty and define a list of heaters and sensors here. Note the length of the list must
# match the number of gates. Leave this settings empty if defining a single sensor/heater.
environment_sensors:                    # Comma separated list of full environment sensor object names
filament_heaters:                       # Comma separated list of full heater object names
max_concurrent_heaters: 1               # Limit the number of simultaneously active heaters (power/PSU protection)


