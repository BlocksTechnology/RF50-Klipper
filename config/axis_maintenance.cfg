[gcode_macro AXIS_MAINTENANCE_X ]
gcode:
  {% set max = printer.toolhead.axis_maximum %}
  G28
  Z_TILT_ADJUST
  G1 X{max.x / 2} Y{max.y / 2} F{100 * 60}

[gcode_macro AXIS_MAINTENANCE_FINISH_X ]
variable_iterations: 5
variable_bound: 20
gcode :
  {% set x_max = printer.toolhead.axis_maximum.x %}
  {% set x_min = printer.toolhead.axis_minimum.x %}

  {% for i in range(0, iterations ) %}
    G1 X{x_min + bound } F{100 * 60}
    G1 X{x_max - bound } F{100 * 60}
  {% endfor %}
  G28

[gcode_macro AXIS_MAINTENANCE_Y ]
gcode:
  G28
  Z_TILT_ADJUST

[gcode_macro AXIS_MAINTENANCE_FINISH_Y]
variable_iterations: 5
variable_bound: 20
gcode:
  {% set y_max = printer.toolhead.axis_maximum.y %}
  {% set y_min = printer.toolhead.axis_minimum.y %}
  {% set x_middle = printer.toolhead.axis_maximum.x / 2%}
  G0 X{x_middle} F{100 * 60 }
  {% for i in range(0, iterations) %}
    G1 Y{y_min + bound} F{100*60}
    G1 Y{y_max - bound} F{100*60}
  {% endfor %}
  G28

[gcode_macro AXIS_MAINTENANCE_Z]
gcode:
  G28
  Z_TILT_ADJUST

[gcode_macro AXIS_MAINTENANCE_FINISH_Z]
variable_iterations: 3
variable_bound: 30
gcode:
  {% set z_max = printer.toolhead.axis_maximum.z %}
  {% set z_min = printer.toolhead.axis_minimum.z %}
  {% set x_middle = printer.toolhead.axis_maximum.x / 2%}
  G0 X{x_middle} F{100 * 60 }
  {% for i in range(0, iterations) %}
    G1 Z{z_min + bound} F{20*60} 
    G1 Z{z_max - bound} F{20*60}
  {% endfor %}

  G28



