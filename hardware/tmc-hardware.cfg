[tmc5160 stepper_x]
cs_pin: OCTO_M1_CS
spi_bus: spi1
sense_resistor: 0.022
run_current: 1.5
stealthchop_threshold: 0
interpolate: True

[tmc5160 stepper_y]
cs_pin: OCTO_M2_CS
spi_bus: spi1
sense_resistor: 0.022
run_current: 1.5
stealthchop_threshold: 0
interpolate: True

[tmc2209 stepper_z]
uart_pin: OCTO_M3_CS
run_current: 1.0
interpolate: False 

[tmc2209 stepper_z1]
uart_pin: OCTO_M4_CS
run_current: 1.0
interpolate: False 

[tmc2209 stepper_z2]
uart_pin: OCTO_M5_CS
run_current: 1.0
interpolate: False 

