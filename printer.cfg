canbus_interface: can0

[mcu Toolhead] # In the RF50 case it's the EBB-36
canbus_uuid:  #TODO
canbus_interface: can0 

[mcu EDDY]
canbus_uuid: #TODO
canbus_interface: can0

[mcu beacon]
serial: #TODO

[mcu pi]
serial: /tmp/klipper_host_mcu

##############################################################################################
##############################################################################################
######################################### KINEMATICS #########################################
##############################################################################################
##############################################################################################
[printer]
kinematics: corexy
max_velocity: 600
max_accel: 30000
max_z_velocity: 10
max_z_accel: 30
##############################################################################################
##############################################################################################
##############################################    ############################################
###################################### Variable Parameters ###################################
##############################################    ############################################
##############################################################################################
##############################################################################################


[respond]
default_type: echo


[display_status]

[pause_resume]

[exclude_object]

[endstop_phase]

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[save_variables]
filename: /home/blocks/printer_data/config/variables.cfg


[force_move]
enable_force_move: True

[idle_timeout]
timeout: 86400 ; one day 


[skew_correction]

[extruder]

[heater_bed]
control: pid 
pid_Kp:61.331 
pid_Ki:1.636 
pid_Kd:574.981
# pid_kp: 57.899
# pid_ki: 1.184
# pid_kd: 707.813

[gcode_arcs]
resolution: 0.1

[input_shaper]


[bed_mesh]
speed: 350

[stepper_z]
# position_endstop: 0


[probe_eddy_current toolhead_scanner]
z_offset: 2.5

